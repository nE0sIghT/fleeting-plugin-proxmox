concurrent = 20
check_interval = 3

[[runners]]
  name = "proxmox-fleeting"
  url = "https://gitlab.example.com"
  token = "RUNNER_TOKEN"
  executor = "instance"

  # This example is for the `instance` executor.
  # For Docker-on-ephemeral-VM workloads, see examples/docker-autoscaler.config.toml.

  [runners.autoscaler]
    plugin = "/usr/local/bin/fleeting-plugin-proxmox"
    capacity_per_instance = 1
    max_use_count = 1
    max_instances = 20
    instance_ready_command = "cloud-init status --wait || test $? -eq 2"

  [runners.autoscaler.plugin_config]
    api_url = "https://pve.example.com:8006"
    token_id = "gitlab-runner@pve!fleeting"
    token_secret = "REDACTED"
    tls_ca_file = "/etc/gitlab-runner/proxmox-ca.pem"
    cluster_name = "prod-pve"
    pool = "gitlab-ci"
    template_vmids = [9000]
    name_prefix = "glr"
    vmid_range = "500000-500999"
    nodes = ["pve01", "pve02"]

    scheduler = "balanced"
    clone_mode = "full"
    target_storages = ["ceph-vm", "local-lvm"]
    vm_memory_mb = 4096
    vm_cpu_cores = 4
    vm_disk_mb = 40960
    max_parallel_clones = 2
    max_parallel_starts = 4
    max_parallel_deletes = 2
    node_reserve_memory_percent = 10
    node_reserve_cpu_percent = 10
    node_reserve_disk_percent = 10

    cloud_init_enabled = true
    cloud_init_interface = "ipconfig0"
    network_mode = "static"
    ci_user = "ubuntu"
    ci_ssh_keys = [
      "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIBExampleRunnerKey gitlab-runner@example"
    ]
    nameserver = ["10.10.0.10", "10.10.0.11"]
    searchdomain = "corp.example"

    ip_pool_network = "10.10.20.0/24"
    ip_pool_gateway = "10.10.20.1"
    ip_pool_ranges = ["10.10.20.100-10.10.20.199"]
    ip_pool_exclude = ["10.10.20.150"]
    ip_pool_reuse_cooldown = "10m"
    state_file = "/var/lib/fleeting-plugin-proxmox/state.json"

    # For DHCP-based provisioning instead:
    # network_mode = "dhcp"
    # omit ip_pool_* settings and state_file

    tags = ["env-prod", "gitlab-runner"]
    description_template = "Managed by GitLab Runner; node={{ .Node }}; vmid={{ .VMID }}; ip={{ .IP }}"

  [runners.autoscaler.connector_config]
    os = "linux"
    protocol = "ssh"
    protocol_port = 22
    username = "ubuntu"
    keepalive = "30s"
    timeout = "5m"
    use_external_addr = false

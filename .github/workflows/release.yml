name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          BIN="fleeting-plugin-proxmox"
          OUT="${BIN}-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w -X 'gitlab.com/gitlab-org/fleeting/plugins/proxmox.VERSION=${GITHUB_REF_NAME#v}' -X 'gitlab.com/gitlab-org/fleeting/plugins/proxmox.REFERENCE=${GITHUB_REF_NAME}' -X 'gitlab.com/gitlab-org/fleeting/plugins/proxmox.REVISION=${GITHUB_SHA}' -X 'gitlab.com/gitlab-org/fleeting/plugins/proxmox.BUILT=$(date -u +%Y-%m-%dT%H:%M:%SZ)'" -o "dist/${OUT}" ./cmd/fleeting-plugin-proxmox
          tar -C dist -czf "dist/${OUT}.tar.gz" "${OUT}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: make test

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          BIN="fleeting-plugin-proxmox"
          OUT="${BIN}-${GOOS}-${GOARCH}"
          make clean
          make build
          mv "dist/${BIN}" "dist/${OUT}"
          tar -C dist -czf "dist/${OUT}.tar.gz" "${OUT}"
          sha256sum "dist/${OUT}.tar.gz" > "dist/${OUT}.tar.gz.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
